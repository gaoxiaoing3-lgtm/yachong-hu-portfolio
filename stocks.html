<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时股市观测 | 胡亚崇作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-refresh {
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
            color: white;
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,210,170,0.4);
        }
        
        .btn-auto {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-auto.active {
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border: none;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .stock-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .stock-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,210,170,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .stock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
        }
        
        .stock-card.down::before {
            background: linear-gradient(90deg, #f5576c, #f093fb);
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .stock-symbol {
            font-size: 1.8em;
            font-weight: 700;
            color: #00d2aa;
        }
        
        .stock-name {
            font-size: 0.9em;
            color: #888;
            margin-top: 4px;
        }
        
        .stock-price {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .stock-change {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .positive {
            background: rgba(0,210,170,0.2);
            color: #00d2aa;
        }
        
        .negative {
            background: rgba(245,87,108,0.2);
            color: #f5576c;
        }
        
        .stock-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat {
            text-align: left;
        }
        
        .stat-label {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d2aa;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .last-update {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 40px;
        }
        
        .indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0,210,170,0.1);
            border: 1px solid rgba(0,210,170,0.3);
            border-radius: 20px;
            font-size: 0.85em;
            color: #00d2aa;
            margin-top: 20px;
        }
        
        .pulse {
            width: 8px;
            height: 8px;
            background: #00d2aa;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 实时股市观测</h1>
            <p class="subtitle">追踪热门科技股实时表现</p>
        </header>
        
        <div class="controls">
            <button class="btn btn-refresh" onclick="fetchData()" id="refreshBtn">
                <span>🔄</span> 刷新
            </button>
            <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">
                <span id="autoIcon">▶</span> 自动刷新：<span id="autoStatus">关</span>
            </button>
        </div>
        
        <div id="stocksGrid" class="stocks-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载股票数据...</p>
            </div>
        </div>
        
        <div class="last-update">
            最后更新：<span id="lastUpdate">--</span>
            <div class="indicator" id="indicator" style="display: none;">
                <div class="pulse"></div>
                自动刷新中... <span id="countdown">10</span>s
            </div>
        </div>
    </div>

    <script>
        const STOCKS = [
            { symbol: 'AAPL', name: 'Apple' },
            { symbol: 'GOOGL', name: 'Alphabet' },
            { symbol: 'MSFT', name: 'Microsoft' },
            { symbol: 'TSLA', name: 'Tesla' },
            { symbol: 'NVDA', name: 'NVIDIA' },
            { symbol: 'META', name: 'Meta' },
            { symbol: 'AMZN', name: 'Amazon' },
        ];
        
        let autoRefresh = false;
        let interval = null;
        let countdown = 10;
        let countdownInterval = null;
        
        async function fetchStockData(symbol) {
            try {
                const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`);
                const data = await response.json();
                
                if (!data.chart?.result?.[0]) return null;
                
                const quote = data.chart.result[0].meta;
                const currentPrice = quote.regularMarketPrice || quote.previousClose;
                const previousClose = quote.previousClose;
                const change = currentPrice - previousClose;
                const changePercent = (change / previousClose) * 100;
                
                return {
                    symbol,
                    name: STOCKS.find(s => s.symbol === symbol)?.name || symbol,
                    price: currentPrice,
                    change,
                    changePercent,
                    high: quote.regularMarketDayHigh,
                    low: quote.regularMarketDayLow,
                    open: quote.regularMarketOpen,
                    previousClose,
                    volume: quote.regularMarketVolume,
                };
            } catch (error) {
                console.error(`Error fetching ${symbol}:`, error);
                return null;
            }
        }
        
        async function fetchData() {
            const grid = document.getElementById('stocksGrid');
            const btn = document.getElementById('refreshBtn');
            
            btn.disabled = true;
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在加载...</p></div>';
            
            const promises = STOCKS.map(fetchStockData);
            const results = await Promise.all(promises);
            const stocks = results.filter(s => s !== null);
            
            renderStocks(stocks);
            updateLastUpdate();
            btn.disabled = false;
        }
        
        function renderStocks(stocks) {
            const grid = document.getElementById('stocksGrid');
            
            if (stocks.length === 0) {
                grid.innerHTML = '<div class="loading"><p>暂无数据</p></div>';
                return;
            }
            
            grid.innerHTML = stocks.map(stock => {
                const isPositive = stock.change >= 0;
                const arrow = isPositive ? '↑' : '↓';
                const sign = isPositive ? '+' : '';
                
                return `
                    <div class="stock-card ${isPositive ? '' : 'down'}">
                        <div class="stock-header">
                            <div>
                                <div class="stock-symbol">${stock.symbol}</div>
                                <div class="stock-name">${stock.name}</div>
                            </div>
                        </div>
                        <div class="stock-price">$${stock.price?.toFixed(2) || 'N/A'}</div>
                        <div class="stock-change ${isPositive ? 'positive' : 'negative'}">
                            <span>${arrow}</span>
                            <span>${sign}${stock.change?.toFixed(2) || '0.00'} (${stock.changePercent?.toFixed(2) || '0.00'}%)</span>
                        </div>
                        <div class="stock-stats">
                            <div class="stat">
                                <div class="stat-label">最高</div>
                                <div class="stat-value">$${stock.high?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">最低</div>
                                <div class="stat-value">$${stock.low?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">开盘</div>
                                <div class="stat-value">$${stock.open?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">昨收</div>
                                <div class="stat-value">$${stock.previousClose?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">成交量</div>
                                <div class="stat-value">${formatVolume(stock.volume)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatVolume(volume) {
            if (!volume) return 'N/A';
            if (volume >= 1e9) return (volume / 1e9).toFixed(2) + 'B';
            if (volume >= 1e6) return (volume / 1e6).toFixed(2) + 'M';
            return volume.toLocaleString();
        }
        
        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN');
        }
        
        function toggleAuto() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('autoBtn');
            const status = document.getElementById('autoStatus');
            const icon = document.getElementById('autoIcon');
            const indicator = document.getElementById('indicator');
            
            if (autoRefresh) {
                btn.classList.add('active');
                status.textContent = '开';
                icon.textContent = '⏸';
                indicator.style.display = 'inline-flex';
                fetchData();
                startCountdown();
                interval = setInterval(() => {
                    fetchData();
                    startCountdown();
                }, 10000);
            } else {
                btn.classList.remove('active');
                status.textContent = '关';
                icon.textContent = '▶';
                indicator.style.display = 'none';
                clearInterval(interval);
                clearInterval(countdownInterval);
            }
        }
        
        function startCountdown() {
            countdown = 10;
            document.getElementById('countdown').textContent = countdown;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                countdown--;
                if (countdown < 0) countdown = 10;
                document.getElementById('countdown').textContent = countdown;
            }, 1000);
        }
        
        // 初始加载
        fetchData();
    </script>
</body>
</html>
