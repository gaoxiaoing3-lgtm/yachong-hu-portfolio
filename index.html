<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡亚崇 - AIGC 动画师 | 虚拟制作专家</title>
    <meta name="description" content="深度耕耘艺术设计类 AIGC 工具类制作人，专注于虚拟演播室制作、舞美效果图设计、虚拟项目落地">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }
        
        /* 导航栏 */
        nav {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }
        
        .nav-links a:hover {
            color: #00d2aa;
        }
        
        /* 英雄区域 */
        .hero {
            padding: 160px 20px 100px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p {
            font-size: 1.3em;
            color: #888;
            margin-bottom: 40px;
        }
        
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,210,170,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 股票观测区域 */
        .stocks-section {
            padding: 100px 20px;
            background: rgba(0,0,0,0.2);
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .section-header h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .section-header p {
            color: #888;
            font-size: 1.1em;
        }
        
        /* 股票卡片网格 */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .stock-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .stock-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,210,170,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .stock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
        }
        
        .stock-card.down::before {
            background: linear-gradient(90deg, #f5576c, #f093fb);
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .stock-symbol {
            font-size: 1.8em;
            font-weight: 700;
            color: #00d2aa;
        }
        
        .stock-name {
            font-size: 0.9em;
            color: #888;
            margin-top: 4px;
        }
        
        .stock-price {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .stock-change {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .positive {
            background: rgba(0,210,170,0.2);
            color: #00d2aa;
        }
        
        .negative {
            background: rgba(245,87,108,0.2);
            color: #f5576c;
        }
        
        .stock-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat {
            text-align: left;
        }
        
        .stat-label {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 1.1em;
            font-weight: 600;
        }
        
        /* 控制按钮 */
        .stocks-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .control-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-refresh {
            background: linear-gradient(90deg, #00d2aa, #3a7bd5);
            color: white;
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,210,170,0.4);
        }
        
        .btn-auto {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-auto.active {
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border: none;
        }
        
        .btn-refresh:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 页脚 */
        footer {
            background: rgba(0,0,0,0.3);
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        footer p {
            color: #888;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d2aa;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 最后更新时间 */
        .last-update {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 40px;
        }
        
        .indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0,210,170,0.1);
            border: 1px solid rgba(0,210,170,0.3);
            border-radius: 20px;
            font-size: 0.85em;
            color: #00d2aa;
            margin-top: 20px;
        }
        
        .pulse {
            width: 8px;
            height: 8px;
            background: #00d2aa;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5em;
            }
            
            .nav-links {
                display: none;
            }
            
            .stocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-content">
            <div class="logo">胡亚崇</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#stocks">股市观测</a></li>
                <li><a href="#portfolio">作品集</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <section class="hero" id="home">
        <h1>🎨 胡亚崇 - AIGC 动画师</h1>
        <p>深度耕耘艺术设计类 AIGC 工具类制作人，专注于虚拟演播室制作、舞美效果图设计、虚拟项目落地</p>
        <div class="cta-buttons">
            <a href="#portfolio" class="btn btn-primary">查看作品</a>
            <a href="#contact" class="btn btn-secondary">联系我</a>
        </div>
    </section>

    <!-- 股票观测区域 -->
    <section class="stocks-section" id="stocks">
        <div class="section-header">
            <h2>📈 实时股市观测</h2>
            <p>追踪热门科技股实时表现</p>
        </div>
        
        <div class="stocks-controls">
            <button class="control-btn btn-refresh" onclick="fetchData()" id="refreshBtn">
                <span>🔄</span> 刷新
            </button>
            <button class="control-btn btn-auto" id="autoBtn" onclick="toggleAuto()">
                <span id="autoIcon">▶</span> 自动刷新：<span id="autoStatus">关</span>
            </button>
        </div>
        
        <div id="stocksGrid" class="stocks-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载股票数据...</p>
            </div>
        </div>
        
        <div class="last-update">
            最后更新：<span id="lastUpdate">--</span>
            <div class="indicator" id="indicator" style="display: none;">
                <div class="pulse"></div>
                自动刷新中... <span id="countdown">10</span>s
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer id="contact">
        <p>© 2026 胡亚崇。All rights reserved.</p>
        <p>邮箱：contact@yachong.hu | GitHub: @gaoxiaoing3-lgtm</p>
    </footer>

    <script>
        const STOCKS = [
            { symbol: 'AAPL', name: 'Apple' },
            { symbol: 'GOOGL', name: 'Alphabet' },
            { symbol: 'MSFT', name: 'Microsoft' },
            { symbol: 'TSLA', name: 'Tesla' },
            { symbol: 'NVDA', name: 'NVIDIA' },
            { symbol: 'META', name: 'Meta' },
            { symbol: 'AMZN', name: 'Amazon' },
        ];
        
        let autoRefresh = false;
        let interval = null;
        let countdown = 10;
        let countdownInterval = null;
        
        async function fetchStockData(symbol) {
            try {
                // 使用多个数据源备用
                const sources = [
                    `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`,
                    `https://api.nasdaq.com/api/quote/${symbol}?assetclass=stocks`,
                    `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=demo`
                ];
                
                for (const url of sources) {
                    try {
                        const response = await fetch(url, { 
                            method: 'GET',
                            headers: {
                                'Accept': 'application/json',
                            }
                        });
                        
                        if (!response.ok) continue;
                        
                        const data = await response.json();
                        
                        // Yahoo Finance
                        if (data.chart?.result?.[0]) {
                            const quote = data.chart.result[0].meta;
                            const currentPrice = quote.regularMarketPrice || quote.previousClose;
                            const previousClose = quote.previousClose;
                            const change = currentPrice - previousClose;
                            const changePercent = (change / previousClose) * 100;
                            
                            return {
                                symbol,
                                name: STOCKS.find(s => s.symbol === symbol)?.name || symbol,
                                price: currentPrice,
                                change,
                                changePercent,
                                high: quote.regularMarketDayHigh,
                                low: quote.regularMarketDayLow,
                                open: quote.regularMarketOpen,
                                previousClose,
                                volume: quote.regularMarketVolume,
                            };
                        }
                        
                        // NASDAQ
                        if (data.data?.quote) {
                            const quote = data.data.quote;
                            return {
                                symbol,
                                name: quote.name || symbol,
                                price: parseFloat(quote.lastSale) || 0,
                                change: parseFloat(quote.change) || 0,
                                changePercent: parseFloat(quote.changePercent) || 0,
                                high: parseFloat(quote.high) || 0,
                                low: parseFloat(quote.low) || 0,
                                open: parseFloat(quote.open) || 0,
                                previousClose: parseFloat(quote.previousClose) || 0,
                                volume: quote.volume || 0,
                            };
                        }
                    } catch (e) {
                        console.warn(`Source failed: ${url}`, e);
                        continue;
                    }
                }
                
                // 如果所有 API 都失败，返回模拟数据用于演示
                console.log(`Using demo data for ${symbol}`);
                return getDemoData(symbol);
                
            } catch (error) {
                console.error(`Error fetching ${symbol}:`, error);
                return getDemoData(symbol);
            }
        }
        
        // 演示数据（当 API 不可用时）
        function getDemoData(symbol) {
            const basePrices = {
                'AAPL': 175.50, 'GOOGL': 140.25, 'MSFT': 415.00,
                'TSLA': 175.00, 'NVDA': 875.00, 'META': 485.00, 'AMZN': 178.00
            };
            const basePrice = basePrices[symbol] || 100;
            const change = (Math.random() - 0.5) * 10;
            const changePercent = (change / basePrice) * 100;
            
            return {
                symbol,
                name: STOCKS.find(s => s.symbol === symbol)?.name || symbol,
                price: basePrice + change,
                change,
                changePercent,
                high: basePrice * 1.02,
                low: basePrice * 0.98,
                open: basePrice,
                previousClose: basePrice,
                volume: Math.floor(Math.random() * 100000000),
            };
        }
        
        async function fetchData() {
            const grid = document.getElementById('stocksGrid');
            const btn = document.getElementById('refreshBtn');
            
            btn.disabled = true;
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在加载...</p></div>';
            
            const promises = STOCKS.map(fetchStockData);
            const results = await Promise.all(promises);
            const stocks = results.filter(s => s !== null);
            
            renderStocks(stocks);
            updateLastUpdate();
            btn.disabled = false;
        }
        
        function renderStocks(stocks) {
            const grid = document.getElementById('stocksGrid');
            
            if (stocks.length === 0) {
                grid.innerHTML = '<div class="loading"><p>暂无数据</p></div>';
                return;
            }
            
            grid.innerHTML = stocks.map(stock => {
                const isPositive = stock.change >= 0;
                const arrow = isPositive ? '↑' : '↓';
                const sign = isPositive ? '+' : '';
                
                return `
                    <div class="stock-card ${isPositive ? '' : 'down'}">
                        <div class="stock-header">
                            <div>
                                <div class="stock-symbol">${stock.symbol}</div>
                                <div class="stock-name">${stock.name}</div>
                            </div>
                        </div>
                        <div class="stock-price">$${stock.price?.toFixed(2) || 'N/A'}</div>
                        <div class="stock-change ${isPositive ? 'positive' : 'negative'}">
                            <span>${arrow}</span>
                            <span>${sign}${stock.change?.toFixed(2) || '0.00'} (${stock.changePercent?.toFixed(2) || '0.00'}%)</span>
                        </div>
                        <div class="stock-stats">
                            <div class="stat">
                                <div class="stat-label">最高</div>
                                <div class="stat-value">$${stock.high?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">最低</div>
                                <div class="stat-value">$${stock.low?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">开盘</div>
                                <div class="stat-value">$${stock.open?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">昨收</div>
                                <div class="stat-value">$${stock.previousClose?.toFixed(2) || 'N/A'}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">成交量</div>
                                <div class="stat-value">${formatVolume(stock.volume)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatVolume(volume) {
            if (!volume) return 'N/A';
            if (volume >= 1e9) return (volume / 1e9).toFixed(2) + 'B';
            if (volume >= 1e6) return (volume / 1e6).toFixed(2) + 'M';
            return volume.toLocaleString();
        }
        
        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN');
        }
        
        function toggleAuto() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('autoBtn');
            const status = document.getElementById('autoStatus');
            const icon = document.getElementById('autoIcon');
            const indicator = document.getElementById('indicator');
            
            if (autoRefresh) {
                btn.classList.add('active');
                status.textContent = '开';
                icon.textContent = '⏸';
                indicator.style.display = 'inline-flex';
                fetchData();
                startCountdown();
                interval = setInterval(() => {
                    fetchData();
                    startCountdown();
                }, 10000);
            } else {
                btn.classList.remove('active');
                status.textContent = '关';
                icon.textContent = '▶';
                indicator.style.display = 'none';
                clearInterval(interval);
                clearInterval(countdownInterval);
            }
        }
        
        function startCountdown() {
            countdown = 10;
            document.getElementById('countdown').textContent = countdown;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                countdown--;
                if (countdown < 0) countdown = 10;
                document.getElementById('countdown').textContent = countdown;
            }, 1000);
        }
        
        // 初始加载
        fetchData();
    </script>
</body>
</html>
